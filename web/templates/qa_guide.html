<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA 가이드 편집</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f8f9fa; --card: #fff; --border: #dee2e6;
    --primary: #0d6efd; --success: #198754; --danger: #dc3545;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #212529;
         display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  nav {
    background: var(--primary); height: 56px; flex-shrink: 0;
    display: flex; align-items: center; padding: 0 2rem; gap: 2rem;
  }
  nav .brand { color: #fff; font-weight: 700; font-size: 1.1rem; text-decoration: none; }
  nav a { color: rgba(255,255,255,0.85); font-size: .88rem; text-decoration: none; }
  nav a:hover { color: #fff; }
  nav .spacer { flex: 1; }

  /* 툴바 */
  .toolbar {
    display: flex; align-items: center; gap: .75rem; padding: .75rem 1.5rem;
    background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .toolbar h2 { font-size: 1rem; font-weight: 600; flex: 1; }
  .toolbar .hint { font-size: .78rem; color: #6c757d; }
  .btn {
    padding: 6px 16px; border: none; border-radius: 6px; font-size: .85rem;
    cursor: pointer; font-weight: 600; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: #495057; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  #toast {
    display: none; position: fixed; bottom: 1.5rem; right: 1.5rem;
    padding: .65rem 1.25rem; border-radius: 8px; font-size: .87rem;
    font-weight: 600; z-index: 999; box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  #toast.success { background: #d1e7dd; color: var(--success); display: block; }
  #toast.error   { background: #f8d7da; color: var(--danger);  display: block; }

  /* 에디터 레이아웃 */
  .editor-wrap {
    display: flex; flex: 1; overflow: hidden; gap: 0;
  }
  .pane {
    flex: 1; overflow-y: auto; padding: 0;
    display: flex; flex-direction: column;
  }
  .pane-label {
    font-size: .72rem; font-weight: 600; color: #6c757d; text-transform: uppercase;
    letter-spacing: .05em; padding: .5rem 1rem; background: #f1f3f5;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1;
  }
  #editor {
    flex: 1; width: 100%; border: none; outline: none; resize: none;
    font-family: 'Cascadia Code', 'Fira Code', 'Courier New', monospace;
    font-size: .85rem; line-height: 1.65; padding: 1rem 1.25rem;
    background: #1e1e2e; color: #cdd6f4; tab-size: 2;
  }
  #editor::selection { background: #45475a; }

  .pane-preview { border-left: 1px solid var(--border); }
  #preview {
    padding: 1.25rem 1.5rem; line-height: 1.75; flex: 1;
    font-size: .92rem; color: #212529;
  }

  /* Markdown 미리보기 스타일 */
  #preview h1 { font-size: 1.5rem; margin: 1.25rem 0 .6rem; border-bottom: 2px solid var(--border); padding-bottom: .3rem; }
  #preview h2 { font-size: 1.2rem; margin: 1.2rem 0 .5rem; border-bottom: 1px solid var(--border); padding-bottom: .25rem; }
  #preview h3 { font-size: 1rem; margin: 1rem 0 .4rem; color: #343a40; }
  #preview p  { margin: .5rem 0; }
  #preview ul, #preview ol { padding-left: 1.5rem; margin: .5rem 0; }
  #preview li { margin: .25rem 0; }
  #preview code {
    font-family: monospace; background: #f1f3f5; padding: 2px 5px;
    border-radius: 3px; font-size: .83em;
  }
  #preview pre {
    background: #1e1e2e; color: #cdd6f4; border-radius: 6px;
    padding: .85rem 1rem; overflow-x: auto; margin: .75rem 0; font-size: .82rem; line-height: 1.55;
  }
  #preview pre code { background: none; padding: 0; color: inherit; }
  #preview blockquote {
    border-left: 3px solid var(--primary); margin: .75rem 0;
    padding: .4rem 1rem; color: #6c757d; background: #f8f9fa;
  }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }
  #preview a { color: var(--primary); }
  #preview table { border-collapse: collapse; width: 100%; margin: .75rem 0; }
  #preview th, #preview td { border: 1px solid var(--border); padding: 6px 10px; font-size: .85rem; }
  #preview th { background: #f1f3f5; font-weight: 600; }
  #preview input[type=checkbox] { margin-right: 5px; }
</style>
</head>
<body>
<nav>
  <a class="brand" href="/">QA SmartOMS</a>
  <a href="/">리포트</a>
  <a href="/qa-guide">QA 가이드</a>
</nav>

<div class="toolbar">
  <h2>QA 가이드 편집</h2>
  <span class="hint" id="char-count"></span>
  <button class="btn btn-outline" onclick="resetContent()">초기화</button>
  <button class="btn btn-primary" id="save-btn" onclick="saveGuide()">저장</button>
</div>

<div class="editor-wrap">
  <div class="pane">
    <div class="pane-label">Markdown 편집</div>
    <textarea id="editor" spellcheck="false">{{ content }}</textarea>
  </div>
  <div class="pane pane-preview">
    <div class="pane-label">미리보기</div>
    <div id="preview"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const charCount = document.getElementById('char-count');
const originalContent = editor.value;

marked.setOptions({ breaks: true, gfm: true });

function render() {
  preview.innerHTML = marked.parse(editor.value);
  // task list checkbox
  preview.querySelectorAll('input[type=checkbox]').forEach(cb => cb.disabled = true);
  charCount.textContent = editor.value.length.toLocaleString() + '자';
}

editor.addEventListener('input', render);

// Tab 키 → 스페이스 2칸
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart, en = editor.selectionEnd;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(en);
    editor.selectionStart = editor.selectionEnd = s + 2;
    render();
  }
  // Ctrl+S / Cmd+S 저장
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveGuide();
  }
});

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type;
  setTimeout(() => { t.className = ''; t.style.display = 'none'; }, 3000);
}

async function saveGuide() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  try {
    const res = await fetch('/api/qa-guide', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: editor.value }),
    });
    if (res.ok) {
      showToast('저장되었습니다.', 'success');
    } else {
      const err = await res.json();
      showToast('저장 실패: ' + (err.detail || res.status), 'error');
    }
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '저장';
  }
}

function resetContent() {
  if (!confirm('편집 내용을 버리고 마지막 저장 내용으로 되돌릴까요?')) return;
  editor.value = originalContent;
  render();
}

// 초기 렌더링
render();
</script>
</body>
</html>
